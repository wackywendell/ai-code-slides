[tools]
node = "22"

[env]
_.path = ["./node_modules/.bin"]

[tasks.install]
description = "Install npm dependencies"
run = "npm install"
sources = ["package.json"]
outputs = ["node_modules/.package-lock.json"]

[tasks.dev]
description = "Run the slidev dev server"
depends = ["install"]
interactive = true
run = "slidev --open"

[tasks.build]
description = "Build the deck to a static SPA in dist/"
depends = ["install"]
run = "slidev build"

[tasks.build-pages]
description = "Build the deck for GitHub Pages"
depends = ["install"]
run = "slidev build --base /ai-code-slides/ --without-notes"

[tasks.export]
description = "Export the deck to PDF. May require installing Playwright."
depends = ["install"]
run = "slidev export"
